<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimeGuard — Настройки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3d;
      --accent: #e63946;
      --accent2: #ff6b6b;
      --green: #06d6a0;
      --yellow: #ffd166;
      --text: #e8e8f0;
      --muted: #7070a0;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 40px 24px;
    }

    /* Фоновая сетка */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Шапка ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
    }

    .logo-badge {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: 12px;
      display: grid; place-items: center;
      font-size: 22px;
      box-shadow: 0 0 24px rgba(230,57,70,.4);
    }

    header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    header span {
      display: block;
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 2px;
    }

    /* ── Секции ── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Форма добавления ── */
    .add-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
    }

    .add-card .fields {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: end;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.5px;
      font-family: 'Space Mono', monospace;
    }

    input[type="text"],
    input[type="number"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all .2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(230,57,70,.3);
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .error-msg {
      font-size: 12px;
      color: var(--accent2);
      margin-top: 8px;
      font-family: 'Space Mono', monospace;
      min-height: 16px;
    }

    /* ── Список правил ── */
    #rules-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 40px;
    }

    .rule-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      animation: slideIn .25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rule-domain {
      flex: 1;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: var(--text);
    }

    .rule-domain small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .rule-limit {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--yellow);
      background: rgba(255,209,102,.08);
      border: 1px solid rgba(255,209,102,.2);
      padding: 4px 10px;
      border-radius: 6px;
    }

    /* Прогресс-бар использования */
    .rule-progress {
      width: 120px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-bottom: 4px;
    }

    .progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .4s ease;
    }

    .btn-delete {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      display: grid; place-items: center;
      transition: all .2s;
      flex-shrink: 0;
    }
    .btn-delete:hover { border-color: var(--accent); color: var(--accent); background: rgba(230,57,70,.08); }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      font-size: 14px;
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 12px; }

    /* ── Статистика ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .stat-domain {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-time {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    .stat-time.over-limit { color: var(--accent); }

    .reset-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 48px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-badge">⏱</div>
      <div>
        <h1>TimeGuard</h1>
        <span>Контроль времени в интернете</span>
      </div>
    </header>

    <!-- Добавить правило -->
    <p class="section-title">Добавить ограничение</p>
    <div class="add-card">
      <div class="fields">
        <div class="field-group">
          <label>ДОМЕН САЙТА</label>
          <input type="text" id="inp-domain" placeholder="youtube.com" />
        </div>
        <div class="field-group">
          <label>ЛИМИТ (МИН)</label>
          <input type="number" id="inp-limit" placeholder="10" min="1" max="1440" style="width:100px" />
        </div>
        <button class="btn btn-primary" id="btn-add">Добавить</button>
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>

    <!-- Список правил -->
    <p class="section-title">Активные ограничения</p>
    <div id="rules-list"></div>

    <!-- Статистика сегодня -->
    <p class="section-title">Статистика за сегодня</p>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="reset-row">
      <button class="btn btn-ghost" id="btn-reset">Сбросить статистику сегодня</button>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
